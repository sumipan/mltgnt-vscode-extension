<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'unsafe-inline'; script-src {{cspSource}};" />
  <title>diary chat</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: var(--vscode-font-family); font-size: var(--vscode-font-size); color: var(--vscode-foreground); background: var(--vscode-editor-background); }
    .layout { display: flex; height: 100vh; }
    .left { flex: 1 1 auto; display: flex; flex-direction: column; border-right: 1px solid var(--vscode-editorWidget-border, #444); min-width: 0; }
    .right { flex: 0 0 240px; display: flex; flex-direction: column; background: var(--vscode-sideBar-background); }
    .header { padding: 8px 12px; border-bottom: 1px solid var(--vscode-editorWidget-border, #444); display: flex; gap: 8px; align-items: center; }
    .header button, .header input { background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border, transparent); padding: 4px 6px; font: inherit; }
    .messages { flex: 1 1 auto; overflow-y: auto; padding: 12px; }
    .msg { padding: 8px 10px; margin-bottom: 8px; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { background: var(--vscode-textBlockQuote-background); border-left: 3px solid var(--vscode-textLink-foreground); }
    .msg.assistant { background: var(--vscode-editorWidget-background); border-left: 3px solid var(--vscode-charts-green, #4caf50); }
    .msg.error { background: var(--vscode-inputValidation-errorBackground); color: var(--vscode-inputValidation-errorForeground); }
    .composer { display: flex; gap: 8px; padding: 8px; border-top: 1px solid var(--vscode-editorWidget-border, #444); }
    .composer textarea { flex: 1 1 auto; resize: none; min-height: 36px; max-height: 200px; background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border, transparent); padding: 6px 8px; font: inherit; }
    .composer button { background: var(--vscode-button-background); color: var(--vscode-button-foreground); border: none; padding: 0 14px; cursor: pointer; }
    .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
    .right h3 { margin: 0; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--vscode-sideBarSectionHeader-foreground); background: var(--vscode-sideBarSectionHeader-background); }
    .session-list { flex: 1 1 auto; overflow-y: auto; }
    .session-item { padding: 6px 12px; cursor: pointer; border-left: 3px solid transparent; font-size: 12px; }
    .session-item.active { background: var(--vscode-list-activeSelectionBackground); color: var(--vscode-list-activeSelectionForeground); border-left-color: var(--vscode-focusBorder); }
    .session-item:hover { background: var(--vscode-list-hoverBackground); }
    .new-session { padding: 8px 12px; display: flex; gap: 4px; border-top: 1px solid var(--vscode-editorWidget-border, #444); }
    .new-session input { flex: 1 1 auto; background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border, transparent); padding: 4px 6px; font: inherit; }
    .new-session button { background: var(--vscode-button-background); color: var(--vscode-button-foreground); border: none; padding: 0 10px; cursor: pointer; }
    .active-file { padding: 4px 12px; font-size: 11px; color: var(--vscode-descriptionForeground); border-bottom: 1px solid var(--vscode-editorWidget-border, #444); }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left">
      <div class="header">
        <span>session:</span>
        <span id="current-session">(none)</span>
      </div>
      <div class="active-file" id="active-file">active: (none)</div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <textarea id="input" placeholder="メッセージを入力 (Ctrl/Cmd+Enter で送信)"></textarea>
        <button id="send" disabled>送信</button>
      </div>
    </div>
    <div class="right">
      <h3>セッション</h3>
      <div class="session-list" id="sessions"></div>
      <div class="new-session">
        <input id="new-topic" placeholder="新規トピック" />
        <button id="new-btn">＋</button>
      </div>
    </div>
  </div>
  <script src="{{mainJs}}"></script>
</body>
</html>
