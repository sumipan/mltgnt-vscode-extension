name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Package extension
        run: npx --yes @vscode/vsce package --no-dependencies -o "mltgnt-vscode-extension-${{ github.ref_name }}.vsix"

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v3
        with:
          files: '*.vsix'
          fail_on_unmatched_files: true
